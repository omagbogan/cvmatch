services:
  - type: web
    name: cvmatch-web
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: APP_DEBUG
        value: "false"
      - key: DB_HOST
        fromDatabase:
          name: cvmatch-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cvmatch-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cvmatch-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cvmatch-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: cvmatch-db
          property: password
      - key: DB_ENGINE
        value: "pgsql"
      - key: IA_SERVICE_URL
        value: "https://cvmatch-python.onrender.com"

  - type: web
    name: cvmatch-python
    runtime: docker
    dockerfilePath: ./python-service/Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: "5000"

databases:
  - name: cvmatch-db
    engine: postgres
    version: "15"
    plan: starter
    databaseName: cvmatch_db
